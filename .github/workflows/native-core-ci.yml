name: Native Core CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-native-core:
    name: Native Core Build (Ubuntu)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Native Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            libraw-dev \
            liblcms2-dev \
            libopenimageio-dev \
            libopencv-dev \
            openimageio-tools \
            pybind11-dev \
            python3-dev

      - name: Verify Native Dependencies
        run: |
          which iconvert
          iconvert --help >/dev/null
          test -d /usr/include/opencv4

      - name: Configure
        run: cmake -S core -B core/build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build core/build --config Release

